<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.7" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
  </defs>
  
  <!-- Base Dark Background -->
  <rect width="100" height="100" rx="28" fill="#0a0a0a" />
  
  <!-- Glass/Border Effect -->
  <rect width="96" height="96" x="2" y="2" rx="26" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="3" />
  
  <!-- "SR" Text Logo -->
  <text 
    x="50" 
    y="68" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-size="44" 
    font-weight="900" 
    fill="url(#textGrad)" 
    text-anchor="middle"
    letter-spacing="-1"
  >SR</text>
</svg>